# Configuración del Propietario
owner: urian121 
repo: octopus-server-monitoring

# Sitios a monitorear
sites:
  - name: UrianViera
    url: https://www.urianviera.com
    method: GET
  - name: GitLab Octapus
    url: https://gitlab.octapus.io
    method: GET
  - name: Tenant Chevyplan
    url: https://chevyplan.akila-prod.octapus.io/admin/login/
    method: GET
  - name: Instancia N8N
    url: https://auto.octapus.io/home
    method: GET
  - name: Prueba IPv6 (TCP Ping)
    url: forwardemail.net
    port: 80
    check: "tcp-ping"
    ipv6: true

# Configuración de la página web de estado
status-website:
  # Si no tienes dominio propio, comenta 'cname' y usa 'baseUrl' con el nombre de tu repo
  # cname: demo.upptime.js.org
  baseUrl: /octopus-server-monitoring
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Monitor de Servicios Octapus
  introTitle: "**Estado de los Servicios**"
  introMessage: Página de estado en tiempo real impulsada por GitHub Actions. No requiere servidor propio.
  navbar:
    - title: Estado Actual
      href: /
    - title: Ver en GitHub
      href: https://github.com/$OWNER/$REPO

# Notificaciones por Correo Electrónico
notifications:
  - type: mail
    # El correo de destino (donde recibirás la alerta)
    to: urianwebdeveloper@gmail.com
    # Datos del servidor SMTP (Ejemplo con Gmail)
    # NOTA: Debes guardar estas contraseñas en GitHub Secrets (Settings > Secrets > Actions)
    smtpHost: smtp.gmail.com
    smtpPort: 465
    smtpSecure: true
    smtpUsername: tu-cuenta-de-envio@gmail.com
    smtpPassword: "$SMTP_PASSWORD"
